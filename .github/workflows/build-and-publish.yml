name: Build and Publish Conda Package

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-publish:
    strategy:
      matrix:
        include:
          - arch: x86_64
            platform: linux-64
          - arch: aarch64
            platform: linux-aarch64

    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (for aarch64)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Build with rattler-build
        uses: prefix-dev/rattler-build-action@v0.3.0
        with:
          version: latest
          upload: "false"
          args: >
            build --recipe recipe.yaml
            --target-platform ${{ matrix.platform }}
            --output-dir ./output
            --experimental

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: conda-package-${{ matrix.platform }}
          path: output/**/*.tar.bz2
          retention-days: 7

      - name: Publish to prefix.dev
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
        uses: prefix-dev/rattler-build-action@v0.3.0
        with:
          command: upload
          args: >
            -c nandi-conda
            ./output/**/*.tar.bz2
        env:
          PREFIX_API_KEY: ${{ secrets.PREFIX_API_KEY }}

  create-release:
    needs: build-and-publish
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./artifacts/**/*.tar.bz2
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
