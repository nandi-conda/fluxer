# Build and Publish Conda Package
#
# IMPORTANT: Always build and test your recipe locally before pushing:
#   rattler-build build --recipe recipe.yaml
#
# This catches syntax errors and configuration issues early, avoiding CI failures.
#
# For nandi-conda repositories, PREFIX_API_KEY is an org-level secret - no need
# to configure per-repository.

name: Build and Publish Conda Package

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:

jobs:
  build-and-publish:
    strategy:
      matrix:
        platform: [linux-64, linux-aarch64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU (for aarch64)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64
      - name: Install rattler-build
        run: |
          arch=$(uname -m)
          if [ "$arch" = "arm64" ]; then arch="aarch64"; fi
          curl -fsSL "https://github.com/prefix-dev/rattler-build/releases/latest/download/rattler-build-${arch}-unknown-linux-musl" \
            -o /usr/local/bin/rattler-build
          chmod +x /usr/local/bin/rattler-build
      - name: Build package
        run: rattler-build build --recipe recipe.yaml --target-platform ${{ matrix.platform }}
      - name: Upload to prefix.dev
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        env:
          PREFIX_API_KEY: ${{ secrets.PREFIX_API_KEY }}
        run: rattler-build upload prefix --channel nandi-conda --force output/**/*.conda

